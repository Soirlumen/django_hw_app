{% extends 'base.html' %}
{% load i18n %}
{% load static %}
{% block title %}
  {% translate "Bad request" %}
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <h3>{% trans "Bad request :(" %}</h3>

        {% if exception %}
            {{ exception }}
        {% else %}
            {% trans "Something went wrong" %}
        {% endif %}
    </div>
</div>
{%endblock%}
