{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load i18n %}

{% block title %}{% translate "Vytvořit zadání" %}{% endblock title %}
{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h5>{% translate "Vytvořit nové zadání" %}</h5>
        </div>
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary mt-2">
                    {% translate "Vytvořit zadání" %}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
