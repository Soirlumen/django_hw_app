{% extends 'base.html' %}
{% load static i18n %}
{% block title %}
  {% translate "Stránka nenalezena" %}
{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="alert alert-danger">
        <h3>{% translate "Stránka nenalezena" %}</h3>

        {% if exception %}
            {{ exception }}
        {% else %}
            {% translate "Stránku se nepodařilo nalézt" %}
        {% endif %}
    </div>
</div>
{%endblock%}
